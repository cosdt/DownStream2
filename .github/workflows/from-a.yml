name: CI from A

on:
  repository_dispatch:
    types: [from-a-pr]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout A repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.a_repo }}
          ref: ${{ github.event.client_payload.sha }}
          path: a-repo

      - name: Run CI
        run: |
          echo "Running CI for A commit"
          cd a-repo
          # 你的 torch-npu CI 在这里
          sleep 3

      - name: Report result to server
        if: always()
        run: |
          curl -X POST http://111.119.217.84:8000/report \
            -H "Content-Type: application/json" \
            -d '{
              "installation_id": "${{ github.event.client_payload.installation_id }}",
              "check_run_id": "${{ github.event.client_payload.check_run_id }}",
              "conclusion": "success"
            }'
