name: B CI

on:
  repository_dispatch:
    types: [from-a-pr]

permissions:
  contents: read

jobs:
  run-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Print payload
        run: |
          echo "A repo: ${{ github.event.client_payload.a_repo }}"
          echo "A sha:  ${{ github.event.client_payload.a_sha }}"
          echo "Check run id: ${{ github.event.client_payload.check_run_id }}"

      - name: Fake CI
        run: |
          echo "Running CI in B..."
          sleep 5
          echo "CI done"
