name: PyTorch Downstream CI 0

on:
  repository_dispatch:
    types:
      - pytorch-pr-trigger

permissions:
  contents: read
  id-token: write

env:
  WORKFLOW_NAME: PyTorch Downstream CI 0

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI
        run: |
          echo "Running downstream workflow 0..."
          sleep 30
          echo "Done"
