name: PyTorch Downstream CI 0

run-name: >-
  Downstream CI 0 -
  ${{
    github.event.client_payload.event_type == 'pull_request' &&
    format(
      'PR #{0} ({1})',
      github.event.client_payload.payload.pull_request.number,
      github.event.client_payload.payload.action
    ) ||
    format('Push {0}', github.event.client_payload.payload.after)
  }}

on:
  repository_dispatch:
    types: [pull_request, push]

concurrency:
  group: >-
    ci-0-${{ github.event.client_payload.payload.repository.full_name }}-${{
    github.event.client_payload.payload.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required by report-ci-result to obtain an OIDC token

jobs:
  cancel-pr:
      if: ${{ github.event.client_payload.payload.action == 'closed' }}
      runs-on: ubuntu-latest
      steps:
        - run: echo "PR closed, canceling older runs in the same concurrency group"
  ci:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out this downstream repo
      - name: Checkout downstream repo
        uses: actions/checkout@v6

      # Step 2: Report in-progress status as early as possible so the upstream
      #         Check Run transitions to "in progress" without delay.
      - name: Report in-progress to Relay Server
        uses: cosdt/test-infra/.github/actions/cross-repo-ci-relay-callback@crcr-L2
        with:
          status: in_progress
          # callback-url: https://smee.io/FYIELaMU9gILwrNv
          callback-url: https://smee.io/Ak2GaTn6BPVGXt7b

      # Step 3: Check out the upstream PyTorch commit that triggered this run.
      #         upstream-repo and commit-sha are read automatically from the
      #         repository_dispatch client_payload.
      # - name: Checkout upstream PR commit
      #   if: ${{ github.event.client_payload.event_type == 'pull_request' }}
      #   uses: actions/checkout@v6
      #   with:
      #     repository: ${{ github.event.client_payload.payload.repository.full_name }}
      #     ref: ${{ github.event.client_payload.payload.pull_request.head.sha }}
      #     token: ${{ github.token }}
      #     submodules: recursive
      #     path: pytorch

      # - name: Checkout upstream push commit
      #   if: ${{ github.event.client_payload.event_type == 'push' }}
      #   uses: actions/checkout@v6
      #   with:
      #     repository: ${{ github.event.client_payload.payload.repository.full_name }}
      #     ref: ${{ github.event.client_payload.payload.after }}
      #     token: ${{ github.token }}
      #     submodules: recursive
      #     path: pytorch


      # Step 4: Run CI
      - name: Run CI
        run: |
          echo "Running downstream workflow 0..."
          sleep 10
          echo "Done"

      # Step 5: Always report the final conclusion so the upstream Check Run
      #         is updated even when earlier steps fail.
      - name: Report final result to Relay Server
        if: always()
        uses: cosdt/test-infra/.github/actions/cross-repo-ci-relay-callback@crcr-L2
        with:
          status: completed
          # callback-url: https://smee.io/FYIELaMU9gILwrNv
          callback-url: https://smee.io/Ak2GaTn6BPVGXt7b
          conclusion: ${{ job.status }}
