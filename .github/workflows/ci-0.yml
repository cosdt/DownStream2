name: PyTorch Downstream CI 0

on:
  repository_dispatch:
    types: [pytorch-pr-trigger]
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report in-progress result to server
        if: always()
        shell: bash
        run: |
          OIDC_RESPONSE="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL")"

          OIDC_TOKEN="$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "$OIDC_RESPONSE")"

          curl --retry 3 --retry-delay 5 --retry-max-time 30 \
            -X POST "${{ vars.CI_RESULT_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "{
              \"workflow_name\": \"PyTorch Downstream CI 0\",
              \"upstream_repo\": \"${{ github.event.client_payload.upstream_repo }}\",
              \"commit_sha\": \"${{ github.event.client_payload.commit_sha }}\",
              \"status\": \"in_progress\",
              \"conclusion\": \"neutral\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"

      - name: Run CI
        run: |
          echo "Running downstream workflow 0..."
          sleep 1
          echo "Done"

      - name: Report final result to server
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            RESULT=success
          else
            RESULT=failure
          fi

          OIDC_RESPONSE="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL")"

          OIDC_TOKEN="$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "$OIDC_RESPONSE")"

          curl --retry 3 --retry-delay 5 --retry-max-time 30 \
            -X POST "${{ vars.CI_RESULT_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -d "{
              \"workflow_name\": \"PyTorch Downstream CI 0\",
              \"upstream_repo\": \"${{ github.event.client_payload.upstream_repo }}\",
              \"commit_sha\": \"${{ github.event.client_payload.commit_sha }}\",
              \"status\": \"completed\",
              \"conclusion\": \"$RESULT\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
