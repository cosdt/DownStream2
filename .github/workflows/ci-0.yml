name: PyTorch Downstream CI 0

on:
  repository_dispatch:
    types: [pytorch-pr-trigger]
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI
        run: |
          echo "Running downstream workflow 0..."
          sleep 1
          echo "Done"

      - name: Report result to server
        if: always()
        env:
          SERVER_URL: http://111.119.217.84:8001
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            RESULT=failure
          else
            RESULT=failure
          fi

          curl -X POST $SERVER_URL/ci/result \
            -H "Content-Type: application/json" \
            -d "{
              \"workflow_name\": \"PyTorch Downstream CI 0\",
              \"upstream_repo\": \"${{ github.event.client_payload.upstream_repo }}\",
              \"commit_sha\": \"${{ github.event.client_payload.commit_sha }}\",
              \"conclusion\": \"$RESULT\",
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
